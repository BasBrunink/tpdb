spring:
  application:
    name: tpdb-rest-backend
  datasource:
    url: jdbc:postgresql://localhost:5432/tpdb-db
    username: tpdb
    password: secret
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
  flyway:
    enabled: false
    baseline-on-migrate: true
    validate-on-migrate: true
    locations:
      - classpath:db/migration
      - classpath:db/seed
      - classpath:db/dummy
server:
  servlet:
    context-path: /api/v1