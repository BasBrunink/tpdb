<h2>Add a park</h2>
<form [formGroup]="newParkForm"(ngSubmit)="storePark()">
  <mat-form-field>
    <mat-label>{{'parks.form.add.name.label' | translate}}</mat-label>
    <input matInput #name maxlength="25" placeholder="name" formControlName="name"/>
  </mat-form-field>
  <mat-form-field>
    <mat-label>{{'parks.form.add.description.label' | translate}}</mat-label>
    <textarea
      matInput
      placeholder="text"
      formControlName="description"
      rows="4"></textarea>
  </mat-form-field>
  <mat-form-field appearance="fill">
    <mat-label>{{'parks.form.add.parkType.label' | translate}}</mat-label>
    <mat-select formControlName="parkType">
      @for(type of parkTypes; track $index){
        <mat-option [value]="type">{{ parkTypeLabels[type] | translate }}</mat-option>
      }
    </mat-select>
  </mat-form-field>
  <mat-form-field>
    <mat-label>{{'parks.form.add.opening.label' | translate}}</mat-label>
    <input matInput [matDatepicker]="picker">
    <mat-hint>MM/DD/YYYY</mat-hint>
    <mat-datepicker-toggle matIconSuffix [for]="picker"></mat-datepicker-toggle>
    <mat-datepicker #picker></mat-datepicker>
  </mat-form-field>
  <button type="submit" [disabled]="!newParkForm.valid">Submit</button>
</form>
