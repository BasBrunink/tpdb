<h1>Parks</h1>

<div class="container">


  <table mat-table [dataSource]="parks" multiTemplateDataRows class="mat-elevation-z8">

    <!-- Name Column -->
    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef> Name</th>
      <td mat-cell *matCellDef="let element"> {{ element.name }}</td>
    </ng-container>

    <!-- parkType Column -->
    <ng-container matColumnDef="parkType">
      <th mat-header-cell *matHeaderCellDef> ParkType</th>
      <td mat-cell *matCellDef="let element"> {{ element.parkType }}</td>
    </ng-container>

    <!-- Symbol Column -->
    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef> Park Status</th>
      <td mat-cell *matCellDef="let element"> {{ element.status }}</td>
    </ng-container>

    <!-- Data Row -->
    <tr mat-header-row *matHeaderRowDef="columnsToDisplay"></tr>
    <tr mat-row *matRowDef="let element; columns: columnsToDisplay;"
        (click)="toggleRow(element)"
        [class.expanded]="expandedElement === element">
    </tr>

    <!-- Expanded Detail Row -->
    <tr mat-row *matRowDef="let element; columns: ['expandedDetail']" class="detail-row"></tr>

    <!-- Expanded Detail Column -->
    <ng-container matColumnDef="expandedDetail">
      <td mat-cell *matCellDef="let element" [attr.colspan]="columnsToDisplay.length">
        @if (expandedElement === element) {

          <!--TODO: opmaak voor details -->
          <div class="element-detail">
            <h2>Description: </h2>
            <p>
              {{ element.description }}
            </p>
          </div>
        }
      </td>
    </ng-container>

  </table>
</div>
